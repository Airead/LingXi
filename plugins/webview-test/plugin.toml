[plugin]
id = "io.github.airead.lingxi.webview-test"
name = "WebView Test"
description = "Test plugin for verifying WebView API functionality"
version = "1.0.0"
author = "LingXi Team"
url = "https://github.com/Airead/LingXi"
min_lingxi_version = "1.1.0"

files = [
    "init.lua",
    "test.html",
]

[search]
prefix = "wv"
debounce = 50
timeout = 10000

[permissions]
network = false
clipboard = true
filesystem = []
shell = []
notify = false
store = false
webview = true

[[commands]]
name = "webview-test:send"
title = "Send Message to WebView"
subtitle = "Send a test message to the active WebView"
action = "cmd_send"
