[plugin]
id = "io.github.airead.lingxi.test-paste-icon"
name = "Paste & Icon Test"
description = "Test plugin for verifying lingxi.paste(), icon, modifier actions, preview, fuzzy.search, and json.parse APIs"
version = "1.0.0"
author = "LingXi Team"
url = "https://github.com/Airead/LingXi"
min_lingxi_version = "1.0.0"

files = [
    "init.lua",
]

[search]
prefix = "test"
debounce = 50
timeout = 10000

[permissions]
network = false
clipboard = true
filesystem = []
shell = []
notify = false
store = false
